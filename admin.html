<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kingsley Host Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="admin-container">
    <h1>Admin Panel</h1>
    <div class="admin-login" id="loginDiv">
      <input type="password" id="adminPass" placeholder="Enter Admin Password">
      <button onclick="loginAdmin()">Login</button>
    </div>

    <div class="admin-panel" id="adminPanel" style="display:none;">
      <h2>Add New Server</h2>
      <input id="panelUrl" placeholder="Panel URL">
      <input id="username" placeholder="Username">
      <input id="password" placeholder="Password">
      <input id="ram" placeholder="RAM">
      <input id="cpu" placeholder="CPU">
      <input id="type" placeholder="Type">
      <button onclick="addServer()">Add Server</button>

      <h2>All Servers</h2>
      <div id="allServers"></div>
    </div>
  </div>

<script>
const ADMIN_PASSWORD = "Kingsley123";

function loginAdmin() {
  const pass = document.getElementById("adminPass").value;
  if (pass === ADMIN_PASSWORD) {
    document.getElementById("loginDiv").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    loadServers();
  } else {
    alert("Wrong password!");
  }
}

async function addServer(){
  const server = {
    panelUrl: document.getElementById("panelUrl").value,
    username: document.getElementById("username").value,
    password: document.getElementById("password").value,
    ram: document.getElementById("ram").value,
    cpu: document.getElementById("cpu").value,
    type: document.getElementById("type").value
  };

  const res = await fetch("/admin/add-server", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(server)
  });

  const data = await res.json();
  if(data.success) alert("Server added!");
  loadServers();
}

async function loadServers() {
  const res = await fetch("/admin/servers");
  const servers = await res.json();
  const container = document.getElementById("allServers");
  container.innerHTML = '';

  servers.forEach(s => {
    const card = document.createElement("div");
    card.classList.add("server-card");
    card.innerHTML = `
      <h3>${s.type || "Server"}</h3>
      <p>RAM: ${s.ram} | CPU: ${s.cpu} | Status: ${s.status}</p>
      <button onclick="resetServer('${s.id}')">Reset Server</button>
    `;
    container.appendChild(card);
  });
}

async function resetServer(id){
  const res = await fetch("/admin/reset-server", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({id})
  });
  const data = await res.json();
  if(data.success) alert("Server reset!");
  loadServers();
}
</script>
</body>
</html>
