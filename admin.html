<!DOCTYPE html>
<html>
<head>
  <title>Kingsley Host Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Kingsley Host Admin</h1>

  <div id="loginDiv">
    <input type="password" id="adminPass" placeholder="Enter Admin Password">
    <button onclick="loginAdmin()">Login</button>
  </div>

  <div id="adminPanel" style="display:none;">
    <h2>Add New Server</h2>
    <input id="panelUrl" placeholder="Panel URL">
    <input id="username" placeholder="Username">
    <input id="password" placeholder="Password">
    <input id="ram" placeholder="RAM (e.g., 1GB)">
    <input id="cpu" placeholder="CPU (e.g., 100%)">
    <input id="type" placeholder="Type (Node.js, Python)">
    <button onclick="addServer()">Add Server</button>

    <h2>All Servers</h2>
    <table border="1" id="serverTable">
      <tr>
        <th>ID</th>
        <th>URL</th>
        <th>Username</th>
        <th>Status</th>
        <th>Claimed By</th>
        <th>Action</th>
      </tr>
    </table>
  </div>

  <script>
    const ADMIN_PASSWORD = "Kingsley123"; // Change this

    function loginAdmin() {
      const pass = document.getElementById("adminPass").value;
      if (pass === ADMIN_PASSWORD) {
        document.getElementById("loginDiv").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
        loadServers();
      } else {
        alert("Wrong password!");
      }
    }

    async function addServer() {
      const data = {
        panelUrl: document.getElementById("panelUrl").value,
        username: document.getElementById("username").value,
        password: document.getElementById("password").value,
        ram: document.getElementById("ram").value,
        cpu: document.getElementById("cpu").value,
        type: document.getElementById("type").value
      };

      const res = await fetch("/admin/add-server", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(data)
      });

      const result = await res.json();
      if (result.success) {
        alert("Server added!");
        loadServers();
      }
    }

    async function loadServers() {
      const res = await fetch("/admin/servers");
      const servers = await res.json();

      const table = document.getElementById("serverTable");
      table.innerHTML = `
        <tr>
          <th>ID</th>
          <th>URL</th>
          <th>Username</th>
          <th>Status</th>
          <th>Claimed By</th>
          <th>Action</th>
        </tr>
      `;

      servers.forEach(s => {
        const row = table.insertRow();
        row.insertCell(0).innerText = s.id;
        row.insertCell(1).innerText = s.panelUrl;
        row.insertCell(2).innerText = s.username;
        row.insertCell(3).innerText = s.status;
        row.insertCell(4).innerText = s.claimedBy || "-";
        const actionCell = row.insertCell(5);
        const resetBtn = document.createElement("button");
        resetBtn.innerText = "Reset";
        resetBtn.onclick = () => resetServer(s.id);
        actionCell.appendChild(resetBtn);
      });
    }

    async function resetServer(id) {
      const res = await fetch("/admin/reset-server", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ id })
      });
      const result = await res.json();
      if (result.success) {
        alert("Server reset!");
        loadServers();
      }
    }
  </script>
</body>
</html>
